<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big 3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f6;
      --surface: #ffffff;
      --border: #e4e4e2;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #4f46e5;
      --todo-col: #6b7280;
      --wip-col: #d97706;
      --wip-bg: #fffbeb;
      --done-col: #16a34a;
      --done-bg: #f0fdf4;
      --r: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --surface: #1c1c1e;
        --border: #2c2c2e;
        --text: #f5f5f5;
        --muted: #8e8e93;
        --accent: #818cf8;
        --todo-col: #9ca3af;
        --wip-col: #fbbf24;
        --wip-bg: #1c1400;
        --done-col: #4ade80;
        --done-bg: #052e16;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 72px;
    }

    .wrap { max-width: 560px; margin: 0 auto; }

    /* ── Header ── */
    header { margin-bottom: 36px; }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header .sub { font-size: 0.88rem; color: var(--muted); margin-top: 4px; }

    /* ── Section label ── */
    .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    section { margin-bottom: 32px; }

    /* ── Empty state ── */
    .empty {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--r);
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    /* ── Task card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .card.in-progress { background: var(--wip-bg); border-color: transparent; }
    .card.done        { background: var(--done-bg); border-color: transparent; }

    .card-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
      text-align: center;
    }

    .card-text {
      flex: 1;
      font-size: 0.93rem;
      line-height: 1.45;
    }
    .card.done .card-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* ── Status button ── */
    .st-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      color: var(--todo-col);
      transition: opacity 0.12s;
    }
    .st-btn:hover { opacity: 0.7; }
    .st-btn.in-progress { color: var(--wip-col);  border-color: var(--wip-col); }
    .st-btn.done        { color: var(--done-col); border-color: var(--done-col); }
    .st-btn .dot { font-size: 0.9em; }

    /* ── Plan form ── */
    .form-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
    }
    .form-box p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .input-row .n {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .input-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: var(--accent); }

    .save-btn {
      width: 100%;
      margin-top: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover:not(:disabled) { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Tomorrow preview ── */
    .preview-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
    }
    .preview-row {
      display: flex;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--muted);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .preview-row:last-of-type { border-bottom: none; }
    .preview-row .pn { font-size: 0.72rem; font-weight: 700; color: var(--muted); }

    .edit-btn {
      display: block;
      margin-top: 12px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--accent);
      cursor: pointer;
      text-align: right;
      padding: 0;
    }
    .edit-btn:hover { text-decoration: underline; }

    /* ── History ── */
    details summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    details summary::before {
      content: '▶';
      font-size: 0.55rem;
      transition: transform 0.18s;
    }
    details[open] summary::before { transform: rotate(90deg); }

    .hist-day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .hist-date {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .hist-task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.86rem;
      padding: 5px 0;
    }
    .hist-task .hn { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
    .hist-task .ht { flex: 1; }
    .hist-task .ht.done { text-decoration: line-through; color: var(--muted); }
    .hist-badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }
    .hist-badge.in-progress { color: var(--wip-col);  border-color: var(--wip-col); }
    .hist-badge.done        { color: var(--done-col); border-color: var(--done-col); }
  </style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
  const KEY = 'big3_v1';
  let editingTomorrow = false;

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { days: {} }; }
    catch { return { days: {} }; }
  }

  function save(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function tomorrowStr() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  }

  function fmtDate(isoDate) {
    return new Date(isoDate + 'T00:00:00').toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });
  }

  const STATUSES  = ['todo', 'in-progress', 'done'];
  const ST_LABEL  = { todo: 'To Do', 'in-progress': 'In Progress', done: 'Done' };
  const ST_DOT    = { todo: '○', 'in-progress': '◐', done: '●' };

  function nextStatus(s) {
    return STATUSES[(STATUSES.indexOf(s) + 1) % STATUSES.length];
  }

  function cycleStatus(date, taskId) {
    const data = load();
    const task = data.days[date]?.tasks.find(t => t.id === taskId);
    if (!task) return;
    const ns = nextStatus(task.status);
    task.status = ns;
    task.statusHistory.push({ status: ns, timestamp: new Date().toISOString() });
    save(data);
    render();
  }

  function saveTomorrow(texts) {
    const data = load();
    const td = tomorrowStr();
    const now = new Date().toISOString();
    data.days[td] = {
      createdAt: now,
      tasks: texts.map((text, i) => ({
        id: `${td}-${i}`,
        text,
        createdAt: now,
        status: 'todo',
        statusHistory: [{ status: 'todo', timestamp: now }]
      }))
    };
    save(data);
    editingTomorrow = false;
    render();
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Renderers ── */

  function renderTodayCards(day, date) {
    return day.tasks.map((t, i) => `
      <div class="card ${esc(t.status)}">
        <span class="card-num">${i + 1}</span>
        <span class="card-text">${esc(t.text)}</span>
        <button class="st-btn ${esc(t.status)}" data-date="${esc(date)}" data-id="${esc(t.id)}">
          <span class="dot">${ST_DOT[t.status]}</span>${ST_LABEL[t.status]}
        </button>
      </div>
    `).join('');
  }

  function renderPlanForm(existing) {
    const vals = existing?.tasks.map(t => t.text) ?? ['', '', ''];
    const allFilled = vals.every(v => v.trim());
    return `
      <div class="form-box" id="plan-form">
        <p>What are your 3 most important tasks for tomorrow?</p>
        ${vals.map((v, i) => `
          <div class="input-row">
            <span class="n">${i + 1}</span>
            <input type="text" placeholder="Task ${i + 1}" value="${esc(v)}" maxlength="200" />
          </div>
        `).join('')}
        <button class="save-btn" ${allFilled ? '' : 'disabled'}>Save for Tomorrow</button>
      </div>
    `;
  }

  function renderTomorrowPreview(day) {
    return `
      <div class="preview-box">
        ${day.tasks.map((t, i) => `
          <div class="preview-row">
            <span class="pn">${i + 1}</span>
            <span>${esc(t.text)}</span>
          </div>
        `).join('')}
        <button class="edit-btn" id="edit-tomorrow">Edit</button>
      </div>
    `;
  }

  function renderHistoryDay(date, day) {
    return `
      <div class="hist-day">
        <div class="hist-date">${fmtDate(date)}</div>
        ${day.tasks.map((t, i) => `
          <div class="hist-task">
            <span class="hn">${i + 1}</span>
            <span class="ht ${t.status === 'done' ? 'done' : ''}">${esc(t.text)}</span>
            <span class="hist-badge ${t.status}">${ST_LABEL[t.status]}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  /* ── Main render ── */

  function render() {
    const data     = load();
    const today    = todayStr();
    const tomorrow = tomorrowStr();
    const todayDay    = data.days[today];
    const tomorrowDay = data.days[tomorrow];

    const histDates = Object.keys(data.days)
      .filter(d => d !== today && d !== tomorrow && d < today)
      .sort((a, b) => b.localeCompare(a));

    document.getElementById('app').innerHTML = `
      <header>
        <h1>Big 3</h1>
        <div class="sub">${fmtDate(today)}</div>
      </header>

      <section>
        <div class="label">Today</div>
        ${todayDay
          ? renderTodayCards(todayDay, today)
          : '<div class="empty">No tasks planned for today.<br>Use the section below to plan tomorrow.</div>'
        }
      </section>

      <section>
        <div class="label">Plan for Tomorrow</div>
        ${(tomorrowDay && !editingTomorrow)
          ? renderTomorrowPreview(tomorrowDay)
          : renderPlanForm(editingTomorrow ? tomorrowDay : null)
        }
      </section>

      ${histDates.length ? `
      <section>
        <details>
          <summary>Past Days</summary>
          ${histDates.map(d => renderHistoryDay(d, data.days[d])).join('')}
        </details>
      </section>
      ` : ''}
    `;

    /* ── Event listeners ── */

    document.querySelectorAll('.st-btn').forEach(btn => {
      btn.addEventListener('click', () => cycleStatus(btn.dataset.date, btn.dataset.id));
    });

    const editBtn = document.getElementById('edit-tomorrow');
    if (editBtn) {
      editBtn.addEventListener('click', () => { editingTomorrow = true; render(); });
    }

    const form = document.getElementById('plan-form');
    if (form) {
      const inputs  = [...form.querySelectorAll('input')];
      const saveBtn = form.querySelector('.save-btn');

      const check = () => { saveBtn.disabled = inputs.some(i => !i.value.trim()); };
      inputs.forEach(inp => inp.addEventListener('input', check));

      saveBtn.addEventListener('click', () => {
        const texts = inputs.map(i => i.value.trim());
        if (texts.some(t => !t)) return;
        saveTomorrow(texts);
      });

      inputs.forEach((inp, idx) => {
        inp.addEventListener('keydown', e => {
          if (e.key !== 'Enter') return;
          if (idx < inputs.length - 1) inputs[idx + 1].focus();
          else saveBtn.click();
        });
      });

      (inputs.find(i => !i.value.trim()) ?? inputs[0]).focus();
    }
  }

  render();
</script>
</body>
</html>
